site_name: samesame
repo_url: https://github.com/vathymut/samesame
site_url: https://vathymut.github.io/samesame/
site_description: Samesame - Score-vector shift hypothesis tests
site_author: Vathy M. Kamulete

nav:
  - Home: index.md
  - Tutorials:
    - Detect a distribution shift: examples/tutorials/detect-distribution-shift.md
    - Check whether a shift is harmful: examples/tutorials/check-shift-harm.md
  - How-to guides:
    - Monitor a credit risk model: examples/credit/monitor-credit-risk.md
    - Monitor prediction errors: examples/credit/monitor-prediction-errors.md
    - Monitor model confidence: examples/credit/monitor-confidence-ood.md
  - API reference:
      - Testing functions: api/testing.md
      - Advanced controls: api/advanced.md
      - Weighting strategies: api/weighting.md
      - Bayes factors: api/bayes_factors.md
      - Importance weights: api/importance_weights.md
      - Logit scores: api/logit_scores.md
plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
theme:
  name: material
  icon:
    logo: fontawesome/solid/check-double
    favicon: fontawesome/solid/check-double
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.expand
  palette:
    primary: white
    accent: blue
markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js