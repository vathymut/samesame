site_name: samesame
repo_url: https://github.com/vathymut/samesame
repo_name: vathymut/samesame
site_url: https://vathymut.github.io/samesame/
site_description: Samesame - Score-vector shift hypothesis tests
site_author: Vathy M. Kamulete
copyright: Copyright &copy; Vathy M. Kamulete

nav:
  - Home: index.md
  - Tutorials:
    - Detect a distribution shift: examples/tutorials/detect-distribution-shift.md
    - Check whether a shift is harmful: examples/tutorials/check-shift-harm.md
    - Adjust for covariate shift with importance weights: examples/tutorials/adjust-for-covariate-shift.md
  - How-to guides:
    - Monitor a credit risk model: examples/credit/monitor-credit-risk.md
    - Monitor prediction errors: examples/credit/monitor-prediction-errors.md
    - Monitor model confidence: examples/credit/monitor-confidence-ood.md
    - Use source reweighting for adverse-shift testing: examples/weighting/source-reweighting.md
    - Use double-weighting for covariate-shift adaptation: examples/weighting/double-weighting.md
  - Explanation:
    - Why importance weights stabilise shift detection: explanation/importance-weights-rationale.md
  - API reference:
      - Testing functions: api/testing.md
      - Advanced controls: api/advanced.md
      - Weighting strategies: api/weighting.md
      - Bayes factors: api/bayes_factors.md
      - Importance weights: api/importance_weights.md
      - Logit scores: api/logit_scores.md
plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
theme:
  name: material
  icon:
    logo: fontawesome/solid/check-double
    favicon: fontawesome/solid/check-double
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.expand
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    primary: white
    accent: blue
markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vathymut/samesame
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/samesame/
      name: PyPI
extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js